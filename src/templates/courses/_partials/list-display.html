<div class="grid gap-4 lg:grid-cols-3 md:grid-cols-2 grid-cols-1">
{% for object in queryset %}
    <article class="p-6 rounded-lg border border-gray-200 shadow-md bg-[--secondary-color] space-y-2">
        {% if object.is_coming_soon %}
        <div class="flex justify-between items-center mb-5 text-gray-500">
            <span class="text-sm">COMING SOON</span>
        </div>
        {% endif %}
        
        {% if object.get_thumbnail%}
        <a href="{{object.get_absolute_url}}">
            <img class="rounded" src="{{object.get_thumbnail}}" width='300' alt='Not Found' />
        </a>
        {% endif %}
        <h2 class="mb-2 text-2xl font-bold tracking-tight text-gray-900"><a href="#">{{object.title}}</a></h2>
        <p class="mb-5 font-light text-gray-500">{{object.description}}</p>
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img class="w-7 h-7 rounded-full" src="https://flowbite.s3.amazonaws.com/blocks/marketing-ui/avatars/bonnie-green.png" alt="Bonnie Green avatar" />
                <span class="font-medium text-black">
                    Bonnie Green
                </span>
            </div>
            <a href="{{object.get_absolute_url}}" class="inline-flex items-center font-medium text-dark hover:underline">
                Read more
                <svg class="ml-2 w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
            </a>
        </div>
    </article>
{% endfor %}  
</div>
